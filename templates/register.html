<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Register</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>
<body>
    <nav class="navbar navbar-dark bg-dark mb-3">
        <div class="container">
            <a class="navbar-brand" href="#">
                <img src="{{ url_for('static', filename='images/logo.png') }}" style="filter: invert(100%)" alt="Logo"
                    width="30" height="30" class="d-inline-block align-text-top">
                <span class="navbar-brand h1">PRODUCT MANAGER</span>
            </a>

            <div>
                <a href="{{ url_for('register') }}" class="btn btn-outline-light">Register</a>
                <a href="{{ url_for('login') }}" class="btn btn-light">Login</a>
            </div>

        </div>
    </nav>

    <div class="container">
        {% with messages = get_flashed_messages() %}
          {% if messages %}
            {% for message in messages %}
              <div class="alert alert-info" role="alert">
                {{ message }}
              </div>
            {% endfor %}
          {% endif %}
        {% endwith %}
    </div>

    <div class="container">
        <h1 class="mb-4">Register</h1>

        <form class="mb-4" method="post">
            <div class="col-md-3 mb-4">
                <input type="text" name="name_company" class="form-control" placeholder="Name company" required>
            </div>

            <div class="col-md-3 mb-4">
                <input type="password" name="password" class="form-control" placeholder="Password" required>
            </div>

            <div class="col-md-3 mb-4">
                <button type="submit" class="btn btn-dark w-100">Register</button>
            </div>
        </form>
    </div>
</body>
</html>
