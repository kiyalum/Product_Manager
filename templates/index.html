<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>ProductManager</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>
<body>
    <nav class="navbar navbar-dark bg-dark mb-3">
      <div class="container-fluid">
        <a class="navbar-brand" href="#">
          <img src="{{ url_for('static', filename='images/logo.png') }}" style="filter: invert(100%)" alt="Logo"
               width="30" height="30" class="d-inline-block align-text-top">
          <span class="navbar-brand h1">PRODUCT MANAGER</span>
        </a>
      </div>
    </nav>



    {% with messages = get_flashed_messages() %}
        {% if messages %}
            {% for msg in messages %}
                <p>{{ msg }}</p>
            {% endfor %}
        {% endif %}
    {% endwith%}

    <h3 class="row col-md-2">Add product: </h3>

    <form method="POST" class="row md-4">

          <div class="col-md-2">
              <input type="text" name="name" class="form-control" placeholder="Name" aria-label="Name">
          </div>

          <div class="col-md-2">
              <input type="number" name="price" class="form-control" placeholder="Price" aria-label="Price">
          </div>

          <div class="col-md-2">
              <input type="text" name="category" class="form-control" placeholder="Category" aria-label="Category">
          </div>

          <div class="col-md-1">
              <button type="submit" class="btn btn-dark w-100">Add</button>
          </div>

    </form>
    <br>
    <form method="GET" class="row col-md-4">

        <select name="category" class="form-select">

            <option value="all" {% if choice_category=="all" %} selected {% endif %}>All</option>

            {% for row in categories %}
                <option value="{{ row.category }}" {% if choice_category==row.category %} selected {% endif %}>
                    {{ row.category.title() }}
                </option>
            {% endfor %}

        </select>

        <div class="class col-md-2">
            <button type="submit" class="btn btn-dark w-100">Apply</button>
        </div>

    </form>
    <br>
    <table border="1px" cellpadding="5px" class="table table-hover">
        <thead class="">
            <tr>
                <td>Name</td>
                <td>Price</td>
                <td>Category</td>
                <td>Delete item</td>
            </tr>
        </thead>
        <tbody>
            {% for item in items %}
                <tr>
                    <td>{{ item.name }}</td>
                    <td>{{ item.price }}</td>
                    <td>{{ item.category }}</td>
                    <td>
                        <a href="{{ url_for('delete', name=item.name) }}">
                            <button type="submit" class="btn btn-danger w-40">Delete</button>
                        </a>
                    </td>
                </tr>
            {% endfor %}
        </tbody>
    </table>
</body>
</html>
